<!DOCTYPE html>
<html>
<head>
    <title>Gig Worker Risk Heatmap - OmniSight AI</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 20px; font-family: Arial; }
        #map { height: 600px; width: 100%; }
        .info { padding: 6px 8px; font: 14px/16px Arial; background: white; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
        .legend { line-height: 18px; }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; }
    </style>
</head>
<body>
    <h1>Gig Worker Risk Heatmap (Mumbai/Thane - 5 Zones)</h1>
    <p>Click map for risk at location. Colors: <span style="color:green">Low</span> <60, <span style="color:orange">Medium</span> 60-80, <span style="color:red">High</span> >80.</p>
    <div id="map"></div>

    <script>
        const API_BASE = 'http://localhost:8000/risk';  // uvicorn api.app:app --reload
        const map = L.map('map').setView([19.0761, 72.8777], 11);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function() {
            const div = L.DomUtil.create('div', 'info legend');
            div.innerHTML = '<i style="background:#00ff00"></i> Low<br>' +
                            '<i style="background:#ffff00"></i> Medium<br>' +
                            '<i style="background:#ff0000"></i> High';
            return div;
        };
        legend.addTo(map);

        // Fetch heatmap
        fetch(`${API_BASE}/heatmap`)
            .then(r => r.json())
            .then(data => {
                data.zones.forEach(zone => {
                    L.circle(zone.center, {
                        color: zone.color,
                        fillColor: zone.color,
                        fillOpacity: 0.7,
                        radius: 1000  // 1km approx zone
                    }).addTo(map).bindPopup(`<b>${zone.display_name}</b><br>Risk: ${zone.risk_score.toFixed(2)} (${zone.risk_rank.toUpperCase()})`);
                });
            });

        // Click for risk
        map.on('click', e => {
            fetch(`${API_BASE}/risk/${e.latlng.lat}/${e.latlng.lng}`)
                .then(r => r.json())
                .then(data => {
                    L.popup().setLatLng(e.latlng).setContent(
                        `<b>${data.display_name}</b><br>Dist: ${data.distance_km.toFixed(2)}km<br>Risk: ${data.risk_score.toFixed(2)} (${data.risk_rank.toUpperCase()})`
                    ).openOn(map);
                });
        });
    </script>
</body>
</html>
